services:
  mongo-join:
    image: mongo:8.0
    container_name: join-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  join-service:
    build: .
    container_name: join-service
    depends_on:
      - mongo-join
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodata: