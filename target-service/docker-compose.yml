services:

  mongo-target:
    image: mongo:8
    container_name: target-mongo
    ports:
      # External - External
      - "27018:27017"
    volumes:
      - mongodata:/data/db

  rabbitmq-target:
    image: rabbitmq:3-management
    container_name: rabbitmq-target
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      retries: 5

  target-service:
    build: .
    container_name: target-service
    depends_on:
      rabbitmq-target:
        condition: service_healthy
      mongo-target:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env
    ports:
      - "3002:3002"

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  mongodata:
  minio_data: