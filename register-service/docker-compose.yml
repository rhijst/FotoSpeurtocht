services:
  mongo:
    image: mongo:8.0
    container_name: register-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  register-service:
    build: .
    container_name: register-service
    depends_on:
      - mongo
    env_file:
      - .env
    ports:
      - "3001:3001"

volumes:
  mongodata: