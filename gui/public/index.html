<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>FotoSpeurtocht — Test GUI</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <h1>🗺️ FotoSpeurtocht — Test GUI</h1>

  <div class="grid">

    <!-- TOKEN STATUS -->
    <div class="card" id="tokenDisplay">
      <h2>Auth Token</h2>
      <div class="token-bar" id="tokenBar">No token — log in first</div>
      <button class="secondary" onclick="clearToken()">Clear token</button>
    </div>

    <!-- REGISTER -->
    <div class="card">
      <h2>Register</h2>
      <div>
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="user@example.com"/>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••"/>
      </div>
      <div>
        <label>Role</label>
        <select id="reg-role">
          <option value="participant">participant</option>
          <option value="owner">owner</option>
        </select>
      </div>
      <button onclick="register()">Register</button>
      <div class="response" id="reg-response"></div>
    </div>

    <!-- LOGIN -->
    <div class="card">
      <h2>Login</h2>
      <div>
        <label>Email</label>
        <input type="email" id="login-email" placeholder="user@example.com"/>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button onclick="login()">Login &amp; save token</button>
      <div class="response" id="login-response"></div>
    </div>

    <!-- REGISTER FOR TARGET -->
    <div class="card">
      <h2>Register for Target</h2>
      <div>
        <label>Select Target</label>
        <select id="join-target-id">
          <option value="">— select a target —</option>
        </select>
        <button class="secondary" onclick="refreshJoinTargets()" style="margin-top:.5rem">Refresh list</button>
      </div>
      <div>
        <label>Your Photo</label>
        <input type="file" id="join-photo" accept="image/*"/>
      </div>
      <button onclick="joinTarget()">Register &amp; Submit Photo</button>
      <div class="response" id="join-response"></div>
    </div>

    <!-- TARGETS LIST -->
    <div class="card">
      <h2>Targets</h2>
      <button onclick="loadTargets()">Refresh targets</button>
      <div id="targets-list" style="display:flex;flex-direction:column;gap:.5rem;"></div>
      <div class="response" id="targets-response"></div>
    </div>

    <!-- CREATE TARGET -->
    <div class="card">
      <h2>Create Target</h2>
      <div>
        <label>Title</label>
        <input type="text" id="t-title" placeholder="My target"/>
      </div>
      <div>
        <label>Description</label>
        <input type="text" id="t-description" placeholder="Optional description"/>
      </div>
      <div>
        <label>Location name</label>
        <input type="text" id="t-location" placeholder="Amsterdam"/>
      </div>
      <div class="row">
        <div>
          <label>Latitude</label>
          <input type="number" id="t-lat" placeholder="52.37" step="any"/>
        </div>
        <div>
          <label>Longitude</label>
          <input type="number" id="t-lng" placeholder="4.89" step="any"/>
        </div>
        <div>
          <label>Radius (m)</label>
          <input type="number" id="t-radius" value="100"/>
        </div>
      </div>
      <div>
        <label>Deadline</label>
        <input type="text" id="t-deadline" placeholder="2025-12-31"/>
      </div>
      <div>
        <label>Image</label>
        <input type="file" id="t-image" accept="image/*"/>
      </div>
      <button onclick="createTarget()">Create Target</button>
      <div class="response" id="create-target-response"></div>
    </div>

  </div>

  <script>
    const API = 'http://localhost:3000';

    // ─── Token helpers ───────────────────────────────────────────────
    function getToken() { return localStorage.getItem('token'); }
    function saveToken(t) { localStorage.setItem('token', t); refreshTokenBar(); }
    function clearToken() { localStorage.removeItem('token'); refreshTokenBar(); }
    function refreshTokenBar() {
      const bar = document.getElementById('tokenBar');
      const t = getToken();
      bar.textContent = t ? t : 'No token — log in first';
      bar.className = 'token-bar' + (t ? ' active' : '');
    }
    function authHeader() {
      const t = getToken();
      return t ? { Authorization: `Bearer ${t}` } : {};
    }

    // ─── Response helpers ────────────────────────────────────────────
    function showResponse(elId, data, ok) {
      const el = document.getElementById(elId);
      el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      el.className = 'response ' + (ok ? 'ok' : 'err');
    }

    // ─── Auth ────────────────────────────────────────────────────────
    async function register() {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
          role:     document.getElementById('reg-role').value,
        }),
      });
      showResponse('reg-response', await res.json(), res.ok);
    }

    async function login() {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        }),
      });
      const data = await res.json();
      if (res.ok && data.token) {
        saveToken(data.token);
        showResponse('login-response', { message: 'Logged in!', token: data.token }, true);
      } else {
        showResponse('login-response', data, false);
      }
    }

    // ─── Register for Target ─────────────────────────────────────────
    async function refreshJoinTargets() {
      const res = await fetch(`${API}/targets`, { headers: authHeader() });
      if (!res.ok) return;
      const targets = await res.json();
      const sel = document.getElementById('join-target-id');
      sel.innerHTML = '<option value="">— select a target —</option>';
      (Array.isArray(targets) ? targets : []).forEach(t => {
        const opt = document.createElement('option');
        opt.value = t._id || t.id;
        opt.textContent = t.title;
        sel.appendChild(opt);
      });
    }

    async function joinTarget() {
      const targetId = document.getElementById('join-target-id').value;
      if (!targetId) { alert('Please select a target first.'); return; }
      const file = document.getElementById('join-photo').files[0];
      if (!file) { alert('Please select a photo to upload.'); return; }

      // Step 1: register as participant
      const joinRes = await fetch(`${API}/participants`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeader() },
        body: JSON.stringify({ targetId }),
      });
      const joinData = await joinRes.json();
      if (!joinRes.ok) { showResponse('join-response', joinData, false); return; }

      // Step 2: upload photo
      // const fd = new FormData();
      // fd.append('image', file);
      // fd.append('targetId', targetId);
      // const scoreRes = await fetch(`${API}/score/upload`, {
      //   method: 'POST',
      //   headers: authHeader(),
      //   body: fd,
      // });
      // const scoreData = await scoreRes.json();
      // showResponse('join-response', { join: joinData, score: scoreData }, scoreRes.ok);
    }

    // ─── Targets ─────────────────────────────────────────────────────
    async function loadTargets() {
      const res = await fetch(`${API}/targets`, { headers: authHeader() });
      const data = await res.json();
      showResponse('targets-response', data, res.ok);
      const list = document.getElementById('targets-list');
      list.innerHTML = '';
      if (Array.isArray(data)) {
        data.forEach(t => {
          const div = document.createElement('div');
          div.className = 'target-item';
          div.innerHTML = `
            ${t.imageUrl ? `<img src="${t.imageUrl}" alt="${t.title}" onerror="this.style.display='none'"/>` : ''}
            <div class="info">
              <strong>${t.title}</strong>
              <p>${t.description || ''}</p>
              <p style="color:#6366f1;font-size:.7rem">${t.locationName || ''}</p>
            </div>
            <button class="danger" style="flex-shrink:0" onclick="deleteTarget('${t._id || t.id}')">✕</button>
          `;
          list.appendChild(div);
        });
      }
    }

    async function createTarget() {
      const fd = new FormData();
      fd.append('title',        document.getElementById('t-title').value);
      fd.append('description',  document.getElementById('t-description').value);
      fd.append('locationName', document.getElementById('t-location').value);
      fd.append('lat',          document.getElementById('t-lat').value);
      fd.append('lng',          document.getElementById('t-lng').value);
      fd.append('radius',       document.getElementById('t-radius').value);
      fd.append('deadline',     document.getElementById('t-deadline').value);
      const img = document.getElementById('t-image').files[0];
      if (img) fd.append('image', img);

      const res = await fetch(`${API}/targets`, {
        method: 'POST',
        headers: authHeader(),
        body: fd,
      });
      const data = await res.json();
      showResponse('create-target-response', data, res.ok);
      if (res.ok) loadTargets();
    }

    async function deleteTarget(id) {
      const res = await fetch(`${API}/targets/${id}`, {
        method: 'DELETE',
        headers: authHeader(),
      });
      showResponse('targets-response', await res.json(), res.ok);
      if (res.ok) loadTargets();
    }

    // ─── Init ─────────────────────────────────────────────────────────
    refreshTokenBar();
    if (getToken()) { loadTargets(); refreshJoinTargets(); }
  </script>
</body>
</html>
